services:
  roadmonitor_api:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - persistent-database:/container/api/database
    restart: unless-stopped
    networks:
      - api-network

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/roadmonitor.online/privkey.pem:/etc/letsencrypt/live/roadmonitor.online/privkey.pem:ro
      - /etc/letsencrypt/live/roadmonitor.online/fullchain.pem:/etc/letsencrypt/live/roadmonitor.online/fullchain.pem:ro
    depends_on:
      - roadmonitor_api
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  persistent-database:
    external: true