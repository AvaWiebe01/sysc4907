version: '3.8'

services:
  fastapi_app:
    build: .
    ports:
      - "8000:8000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi_app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge