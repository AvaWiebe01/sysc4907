events {
    worker_connections 1024;
}

http {
    server {
        resolver 127.0.0.11;

        listen 8000;

        ssl_certificate /etc/letsencrypt/live/roadmonitor.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/roadmonitor.online/privkey.pem;

        location / {
            proxy_pass http://roadmonitor_api:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}